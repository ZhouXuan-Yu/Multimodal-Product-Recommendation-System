name: jin
channels:
  - conda-forge
  - defaults
dependencies:
  # Python版本
  - python=3.10

  # 核心科学计算
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=1.5.0

  # 机器学习和深度学习
  - scikit-learn>=1.2.0
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio>=2.0.0
  - transformers>=4.21.0
  - pillow>=10.0.0

  # 数据库
  - pymysql>=1.0.0
  - sqlalchemy>=2.0.0

  # 可视化
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # GUI界面
  - pyqt>=6.5.0

  # 工具库
  - requests>=2.28.0
  - tqdm>=4.64.0
  - pyyaml>=6.0

  # 开发工具
  - pip
  - pip:
      - PyQt6>=6.5.0
      - PyQt6-Qt6>=6.5.0
      - DBUtils>=3.0.0

